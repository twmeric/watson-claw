# Watson Claw - Staging Environment

name = "watson-claw-staging"
main = "src/index.js"
compatibility_date = "2026-03-28"

[vars]
ENVIRONMENT = "staging"
TIMEZONE = "Asia/Hong_Kong"
DEFAULT_LANGUAGE = "zh-HK"
DEFAULT_REMINDER_MINUTES = "15"

# [[d1_databases]]
# binding = "DB"
# database_name = "watson-claw-staging-db"
# database_id = "your-staging-db-id"

# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-staging-kv-id"

[triggers]
crons = ["*/5 * * * *"]  # Staging 每5分鐘檢查，方便測試
